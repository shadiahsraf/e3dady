{% extends 'core/base.html' %}

{% block title %}دخول - E3dady Cup{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 -mt-6">
    <div class="w-full max-w-md glass p-8 relative overflow-hidden">
        <div class="absolute -top-16 -left-16 w-48 h-48 bg-amber-400/15 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-16 -right-16 w-48 h-48 bg-blue-500/15 rounded-full blur-3xl"></div>

        <div class="relative text-center mb-8">
            <div class="text-6xl mb-3">⚽</div>
            <h1 class="text-3xl font-black neon-gold font-cairo">E3DADY CUP</h1>
            <p class="text-sm text-white/40 mt-2">سجّل دخول عشان تبدأ</p>
        </div>

        <form method="post" class="relative space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs text-white/50 mb-1">اسم المستخدم</label>
                <input type="text" name="username" autofocus
                       class="w-full bg-black/40 border border-white/15 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-400/50 transition">
            </div>
            <div>
                <label class="block text-xs text-white/50 mb-1">الباسوورد</label>
                <input type="password" name="password"
                       class="w-full bg-black/40 border border-white/15 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-400/50 transition">
            </div>
            {% if error %}
            <div class="bg-red-500/15 border border-red-500/30 text-red-400 rounded-xl px-4 py-2.5 text-sm text-center font-bold">
                {{ error }}
            </div>
            {% endif %}
            <button type="submit" class="btn-gold w-full py-3.5 text-lg font-black rounded-xl">
                يلا ندخل ⚽
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'leaderboard' %}" class="text-xs text-white/30 hover:text-white/50 transition">شوف الترتيب بدون دخول</a>
        </div>
    </div>
</div>
{% endblock %}
